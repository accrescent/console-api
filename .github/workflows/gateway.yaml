name: Generate gRPC-Gateway code

on: [push, pull_request]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf generate
