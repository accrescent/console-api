syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Response to getting the currently authenticated user.
message GetSelfResponse {
  // The unique ID of the authenticated user.
  optional string user_id = 1 [(buf.validate.field).required = true];
}
