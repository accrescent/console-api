syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "accrescent/appstore/publish/v1alpha1/app_package.proto";
import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// An app draft.
message AppDraft {
  // The app draft's unique ID.
  optional string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // The timestamp at which the app draft has been submitted for review, if
  // applicable.
  google.protobuf.Timestamp submitted_at = 2;

  // The draft's associated package information, if available.
  AppPackage app_package = 3;
}
