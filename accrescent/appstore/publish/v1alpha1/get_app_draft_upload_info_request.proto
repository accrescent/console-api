syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Request defining parameters for getting an app draft's upload info.
message GetAppDraftUploadInfoRequest {
  // The ID of the app draft to get upload info for.
  optional string app_draft_id = 1 [(buf.validate.field).required = true];
}
