syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "accrescent/appstore/publish/v1alpha1/create_app_edit_request.proto";
import "accrescent/appstore/publish/v1alpha1/create_app_edit_response.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Service providing RPCs for managing app edits.
service AppEditService {
  // Creates a new app edit.
  rpc CreateAppEdit(CreateAppEditRequest) returns (CreateAppEditResponse);
}
