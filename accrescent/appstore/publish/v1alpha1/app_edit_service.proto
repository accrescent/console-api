syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "accrescent/appstore/publish/v1alpha1/create_app_edit_listing_request.proto";
import "accrescent/appstore/publish/v1alpha1/create_app_edit_listing_response.proto";
import "accrescent/appstore/publish/v1alpha1/create_app_edit_request.proto";
import "accrescent/appstore/publish/v1alpha1/create_app_edit_response.proto";
import "accrescent/appstore/publish/v1alpha1/delete_app_edit_request.proto";
import "accrescent/appstore/publish/v1alpha1/delete_app_edit_response.proto";
import "accrescent/appstore/publish/v1alpha1/get_app_edit_request.proto";
import "accrescent/appstore/publish/v1alpha1/get_app_edit_response.proto";
import "accrescent/appstore/publish/v1alpha1/list_app_edits_request.proto";
import "accrescent/appstore/publish/v1alpha1/list_app_edits_response.proto";
import "accrescent/appstore/publish/v1alpha1/submit_app_edit_request.proto";
import "accrescent/appstore/publish/v1alpha1/submit_app_edit_response.proto";
import "accrescent/appstore/publish/v1alpha1/update_app_edit_request.proto";
import "accrescent/appstore/publish/v1alpha1/update_app_edit_response.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Service providing RPCs for managing app edits.
service AppEditService {
  // Creates a new app edit.
  rpc CreateAppEdit(CreateAppEditRequest) returns (CreateAppEditResponse);

  // Gets an app edit.
  rpc GetAppEdit(GetAppEditRequest) returns (GetAppEditResponse);

  // Lists app edits.
  rpc ListAppEdits(ListAppEditsRequest) returns (ListAppEditsResponse);

  // Updates an app edit.
  rpc UpdateAppEdit(UpdateAppEditRequest) returns (UpdateAppEditResponse);

  // Submits an app edit.
  rpc SubmitAppEdit(SubmitAppEditRequest) returns (SubmitAppEditResponse);

  // Deletes an app edit.
  rpc DeleteAppEdit(DeleteAppEditRequest) returns (DeleteAppEditResponse);

  // Creates a new app listing for an app edit.
  rpc CreateAppEditListing(CreateAppEditListingRequest) returns (CreateAppEditListingResponse);
}
