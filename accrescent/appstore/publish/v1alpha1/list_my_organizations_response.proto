syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "accrescent/appstore/publish/v1alpha1/organization.proto";
import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Response to requesting an authenticated user's organizations.
message ListMyOrganizationsResponse {
  // The organizations matching the request parameters.
  repeated Organization organizations = 1 [(buf.validate.field).cel = {
    id: "organizations.have_unique_ids"
    message: "organizations must have unique IDs"
    expression: "this.map(o, o.id).unique()"
  }];

  // An opaque token which, if passed to another invocation of
  // ListMyOrganizations, will return the next page of organizations.
  optional string next_page_token = 2;
}
