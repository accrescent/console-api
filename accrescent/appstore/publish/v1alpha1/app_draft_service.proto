syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "accrescent/appstore/publish/v1alpha1/create_app_draft_listing_request.proto";
import "accrescent/appstore/publish/v1alpha1/create_app_draft_listing_response.proto";
import "accrescent/appstore/publish/v1alpha1/create_app_draft_request.proto";
import "accrescent/appstore/publish/v1alpha1/create_app_draft_response.proto";
import "accrescent/appstore/publish/v1alpha1/delete_app_draft_listing_request.proto";
import "accrescent/appstore/publish/v1alpha1/delete_app_draft_listing_response.proto";
import "accrescent/appstore/publish/v1alpha1/delete_app_draft_request.proto";
import "accrescent/appstore/publish/v1alpha1/delete_app_draft_response.proto";
import "accrescent/appstore/publish/v1alpha1/get_app_draft_package_upload_info_request.proto";
import "accrescent/appstore/publish/v1alpha1/get_app_draft_package_upload_info_response.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Service providing RPCs for managing app drafts.
service AppDraftService {
  // Creates a new app draft.
  rpc CreateAppDraft(CreateAppDraftRequest) returns (CreateAppDraftResponse);

  // Gets an app draft's upload info.
  rpc GetAppDraftPackageUploadInfo(GetAppDraftPackageUploadInfoRequest) returns (GetAppDraftPackageUploadInfoResponse);

  // Deletes an existing app draft.
  rpc DeleteAppDraft(DeleteAppDraftRequest) returns (DeleteAppDraftResponse);

  // Creates a new app listing for an app draft.
  rpc CreateAppDraftListing(CreateAppDraftListingRequest) returns (CreateAppDraftListingResponse);

  // Deletes an existing app draft listing.
  rpc DeleteAppDraftListing(DeleteAppDraftListingRequest) returns (DeleteAppDraftListingResponse);
}
