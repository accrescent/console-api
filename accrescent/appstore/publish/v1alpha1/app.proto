syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// A published app.
message App {
  // The app's unique ID.
  optional string id = 1 [(buf.validate.field).required = true];

  // The app's default listing language.
  optional string default_listing_language = 2 [(buf.validate.field).required = true];
}
