syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Request defining parameters for getting an app edit's upload info.
message GetAppEditUploadInfoRequest {
  // The ID of the app edit to get upload info for.
  optional string app_edit_id = 1 [(buf.validate.field).required = true];
}
