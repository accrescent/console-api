syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "accrescent/appstore/publish/v1alpha1/app_edit.proto";
import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Response to listing app edits.
message ListAppEditsResponse {
  // The app drafts matching the request parameters.
  repeated AppEdit app_edits = 1 [(buf.validate.field).cel = {
    id: "app_edits.have_unique_ids"
    message: "app edits must have unique IDs"
    expression: "this.map(e, e.id).unique()"
  }];

  // An opaque token which, if passed to another invocation of ListAppEdits,
  // will return the next page of app edits.
  optional string next_page_token = 2;
}
