syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Request defining parameters for creating an app listing for an app draft.
message CreateAppDraftListingRequest {
  // The app draft to create the app listing for.
  optional string app_draft_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // The language of this listing's fields as a BCP-47 tag.
  optional string language = 2 [(buf.validate.field).required = true];

  // The proper name of the app, possibly including very short descriptive text
  // (e.g. "SecureChat - Secure Texting").
  optional string name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 30
  ];

  // A short description of the app to be shown in headers and small screen
  // spaces.
  optional string short_description = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 80
  ];
}
