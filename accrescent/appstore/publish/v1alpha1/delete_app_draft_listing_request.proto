syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Request defining parameters for deleting an app draft listing.
message DeleteAppDraftListingRequest {
  // The ID of the app draft the listing is associated with.
  optional string app_draft_id = 1 [(buf.validate.field).required = true];

  // The BCP-47 language tag of the listing to delete.
  optional string language = 2 [(buf.validate.field).required = true];
}
