syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "accrescent/appstore/publish/v1alpha1/create_publisher_request.proto";
import "accrescent/appstore/publish/v1alpha1/create_publisher_response.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Service providing RPCs for managing store publishers.
service PublisherService {
  // Creates a store publisher.
  rpc CreatePublisher(CreatePublisherRequest) returns (CreatePublisherResponse);
}
