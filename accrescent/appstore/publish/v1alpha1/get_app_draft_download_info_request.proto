syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Request defining parameters for getting an app draft's download info.
message GetAppDraftDownloadInfoRequest {
  // The ID of the app draft to get download info for.
  optional string app_draft_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}
