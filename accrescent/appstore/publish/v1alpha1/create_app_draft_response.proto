syntax = "proto3";

package accrescent.appstore.publish.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.appstore.publish.v1alpha1";

// Response to creating a new app draft.
message CreateAppDraftResponse {
  // The unique ID of the created app draft.
  optional string app_draft_id = 1 [(buf.validate.field).required = true];
}
