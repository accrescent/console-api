syntax = "proto3";

package accrescent.console.v1alpha1;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  swagger: "2.0"
  info: {
    title: "Accrescent console API"
    description: "The official API for managing resources in the Accrescent console"
    terms_of_service: "https://accrescent.app/legal/terms-of-service"
    contact: {
      name: "Accrescent"
      url: "https://accrescent.app/#contact"
      email: "contact@accrescent.app"
    }
    license: {
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0"
    }
    version: "0.0.0"
  }
  host: "console-api.accrescent.app:443"
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "SessionCookie"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        description: "Accrescent console session cookie with name q_session"
        name: "Cookie"
      }
    }
  }
};
