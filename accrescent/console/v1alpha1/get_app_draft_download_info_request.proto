syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for getting an app draft's download info.
message GetAppDraftDownloadInfoRequest {
  // The ID of the app draft to get download info for.
  string app_draft_id = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];
}
