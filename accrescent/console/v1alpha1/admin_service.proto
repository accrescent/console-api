syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/create_publisher_request.proto";
import "accrescent/console/v1alpha1/create_publisher_response.proto";
import "accrescent/console/v1alpha1/create_reviewer_request.proto";
import "accrescent/console/v1alpha1/create_reviewer_response.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Service providing RPCs for administrating the store.
service AdminService {
  // Creates a store publisher.
  rpc CreatePublisher(CreatePublisherRequest) returns (CreatePublisherResponse) {
    option (google.api.http) = {
      post: "/grpc/accrescent.console.v1alpha1/publishers"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Admin"};
  }

  // Creates a store reviewer.
  rpc CreateReviewer(CreateReviewerRequest) returns (CreateReviewerResponse) {
    option (google.api.http) = {
      post: "/grpc/accrescent.console.v1alpha1/reviewers"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Admin"};
  }
}
