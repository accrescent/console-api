syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/app_package.proto";
import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// An app edit.
message AppEdit {
  // The app edit's unique ID.
  optional string id = 1 [(buf.validate.field).required = true];

  // The timestamp at which the app edit was created.
  google.protobuf.Timestamp created_at = 2 [(buf.validate.field).required = true];

  // The app edit's default listing language.
  optional string default_listing_language = 3 [(buf.validate.field).required = true];

  // The edit's associated package information.
  AppPackage app_package = 4 [(buf.validate.field).required = true];

  // The timestamp at which the app edit has been submitted, if applicable.
  google.protobuf.Timestamp submitted_at = 5;

  // The timestamp at which the app edit has been published, if applicable.
  google.protobuf.Timestamp published_at = 6;

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema).json_schema = {
    required: [
      "id",
      "createdAt",
      "defaultListingLanguage",
      "appPackage"
    ]
  };
}
