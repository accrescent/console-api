syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/list_organizations_request.proto";
import "accrescent/console/v1alpha1/list_organizations_response.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Service providing RPCs for managing organizations.
service OrganizationService {
  // Lists organizations.
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (google.api.http) = {get: "/grpc/accrescent.console.v1alpha1/organizations"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Organizations"};
  }
}
