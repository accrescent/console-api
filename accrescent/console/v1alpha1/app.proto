syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// A published app.
message App {
  // The app's unique ID.
  optional string id = 1 [(buf.validate.field).required = true];

  // The app's default listing language.
  optional string default_listing_language = 2 [(buf.validate.field).required = true];

  // Whether the app is publicly listed on the store.
  optional bool publicly_listed = 3 [(buf.validate.field).required = true];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema).json_schema = {
    required: [
      "id",
      "defaultListingLanguage",
      "publiclyListed"
    ]
  };
}
