syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";
import "google/longrunning/operations.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to creating an app edit listing icon upload operation.
message CreateAppEditListingIconUploadOperationResponse {
  // An HTTP or HTTPS URL at which the icon can be submitted with an HTTP PUT
  // request.
  optional string upload_url = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uri = true
  ];

  // The upload processing operation.
  //
  // The response type of this operation is UploadAppEditListingIconResult.
  google.longrunning.Operation processing_operation = 2 [(buf.validate.field).required = true];
}
