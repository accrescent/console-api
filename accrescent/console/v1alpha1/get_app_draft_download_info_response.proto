syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to getting an app draft's download info.
message GetAppDraftDownloadInfoResponse {
  // The URL of the APK set which can be retrieved with a simple HTTP GET.
  optional string apk_set_url = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uri = true
  ];
}
