syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for getting an app draft listing icon's download
// info.
message GetAppDraftListingIconDownloadInfoRequest {
  // The ID of the app draft of the listing to get icon download info for.
  string app_draft_id = 1 [(buf.validate.field).required = true];

  // The language of the listing to get icon download info for.
  string language = 2 [(buf.validate.field).required = true];
}
