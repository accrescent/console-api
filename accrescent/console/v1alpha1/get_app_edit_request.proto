syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for getting an app edit.
message GetAppEditRequest {
  // The ID of the app edit to retrieve.
  string app_edit_id = 1 [(buf.validate.field).required = true];
}
