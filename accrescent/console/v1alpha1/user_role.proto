syntax = "proto3";

package accrescent.console.v1alpha1;

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// A user authorization role.
enum UserRole {
  // The unspecified value.
  USER_ROLE_UNSPECIFIED = 0;

  // An app reviewer.
  USER_ROLE_REVIEWER = 1;

  // An app publisher.
  USER_ROLE_PUBLISHER = 2;
}
