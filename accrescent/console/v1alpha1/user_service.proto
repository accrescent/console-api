syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/get_self_request.proto";
import "accrescent/console/v1alpha1/get_self_response.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Service providing RPCs for managing users.
service UserService {
  // Gets the user info for the currently authenticated user.
  rpc GetSelf(GetSelfRequest) returns (GetSelfResponse) {
    option (google.api.http) = {get: "/grpc/accrescent.console.v1alpha1/user"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Users"};
  }
}
