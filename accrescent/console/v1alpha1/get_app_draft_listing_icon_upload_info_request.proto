syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for getting an app draft listing icon's upload
// info.
message GetAppDraftListingIconUploadInfoRequest {
  // The ID of the app draft to get icon upload info for.
  optional string app_draft_id = 1 [(buf.validate.field).required = true];

  // The language of the app listing to get icon upload info for.
  optional string language = 2 [(buf.validate.field).required = true];
}
