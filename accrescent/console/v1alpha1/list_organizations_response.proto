syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/organization.proto";
import "buf/validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to listing organizations.
message ListOrganizationsResponse {
  // The organizations matching the request parameters.
  repeated Organization organizations = 1 [(buf.validate.field).cel = {
    id: "organizations.have_unique_ids"
    message: "organizations must have unique IDs"
    expression: "this.map(o, o.id).unique()"
  }];

  // An opaque token which, if passed to another invocation of
  // ListOrganizations, will return the next page of organizations.
  optional string next_page_token = 2;

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema).json_schema = {
    required: ["organizations"]
  };
}
