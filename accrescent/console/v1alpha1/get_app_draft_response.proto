syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/app_draft.proto";
import "buf/validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to getting an app draft.
message GetAppDraftResponse {
  // The requested app draft.
  AppDraft draft = 1 [(buf.validate.field).required = true];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema).json_schema = {
    required: ["draft"]
  };
}
