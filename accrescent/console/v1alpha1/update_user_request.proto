syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/user_role.proto";
import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/field_mask.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for updating a user.
message UpdateUserRequest {
  // The ID of the user to update.
  string user_id = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The user's roles.
  repeated UserRole roles = 2 [
    (buf.validate.field).repeated.items.enum.not_in = 0,
    (buf.validate.field).repeated.unique = true
  ];

  // The list of fields to update.
  //
  // Required to enforce forward-compatible use by clients.
  google.protobuf.FieldMask update_mask = 3 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).field_mask.in = "roles"
  ];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema).json_schema = {
    required: ["roles"]
  };
}
