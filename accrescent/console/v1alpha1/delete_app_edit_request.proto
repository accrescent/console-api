syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for deleting an app edit.
message DeleteAppEditRequest {
  // The ID of the app edit to delete.
  optional string app_edit_id = 1 [(buf.validate.field).required = true];
}
