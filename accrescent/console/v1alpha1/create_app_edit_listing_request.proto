  optional string app_edit_id = 1 [(buf.validate.field).required = true];

  // The language of this listing's fields as a BCP-47 tag.
  optional string language = 2 [
    (buf.validate.field).required = true,
    // Supported languages are the same as those supported by Google Play. See
    // https://support.google.com/googleplay/android-developer/answer/9844778
    // for more details. If Play supports a language not listed here, please
    // report a bug.
    (buf.validate.field).string.in = "af",
    (buf.validate.field).string.in = "sq",
    (buf.validate.field).string.in = "am",
    (buf.validate.field).string.in = "ar",
    (buf.validate.field).string.in = "hy-AM",
    (buf.validate.field).string.in = "az-AZ",
    (buf.validate.field).string.in = "bn-BD",
    (buf.validate.field).string.in = "eu-ES",
    (buf.validate.field).string.in = "be",
    (buf.validate.field).string.in = "bg",
    (buf.validate.field).string.in = "my-MM",
    (buf.validate.field).string.in = "ca",
    (buf.validate.field).string.in = "zh-HK",
    (buf.validate.field).string.in = "zh-CN",
    (buf.validate.field).string.in = "zh-TW",
    (buf.validate.field).string.in = "hr",
    (buf.validate.field).string.in = "cs-CZ",
    (buf.validate.field).string.in = "da-DK",
