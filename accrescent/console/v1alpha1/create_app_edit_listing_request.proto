    (buf.validate.field).string.in = "en-US",
    (buf.validate.field).string.in = "en-GB",
    (buf.validate.field).string.in = "en-IN",
    (buf.validate.field).string.in = "en-SG",
    (buf.validate.field).string.in = "en-ZA",
    (buf.validate.field).string.in = "et",
    (buf.validate.field).string.in = "fil",
    (buf.validate.field).string.in = "fi-FI",
    (buf.validate.field).string.in = "fr-CA",
    (buf.validate.field).string.in = "fr-FR",
    (buf.validate.field).string.in = "gl-ES",
    (buf.validate.field).string.in = "ka-GE",
    (buf.validate.field).string.in = "de-DE",
    (buf.validate.field).string.in = "el-GR",
    (buf.validate.field).string.in = "gu",
    (buf.validate.field).string.in = "iw-IL",
    (buf.validate.field).string.in = "hi-IN",
    (buf.validate.field).string.in = "hu-HU",
    (buf.validate.field).string.in = "is-IS",
    (buf.validate.field).string.in = "id",
    (buf.validate.field).string.in = "it-IT",
    (buf.validate.field).string.in = "ja-JP",
    (buf.validate.field).string.in = "kn-IN",
    (buf.validate.field).string.in = "kk",
    (buf.validate.field).string.in = "km-KH",
    (buf.validate.field).string.in = "ko-KR",
    (buf.validate.field).string.in = "ky-KG",
    (buf.validate.field).string.in = "lo-LA",
    (buf.validate.field).string.in = "lv",
