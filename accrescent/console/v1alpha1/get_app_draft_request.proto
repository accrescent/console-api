syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for getting an app draft.
message GetAppDraftRequest {
  // The ID of the app draft to retrieve.
  optional string app_draft_id = 1 [(buf.validate.field).required = true];
}
