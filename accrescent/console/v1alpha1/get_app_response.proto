syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/app.proto";
import "buf/validate/validate.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to getting an app.
message GetAppResponse {
  // The requested app.
  App app = 1 [(buf.validate.field).required = true];
}
