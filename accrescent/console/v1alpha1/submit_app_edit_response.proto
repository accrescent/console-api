syntax = "proto3";

package accrescent.console.v1alpha1;

import "google/longrunning/operations.proto";

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to submitting an app edit.
message SubmitAppEditResponse {
  // The publishing operation. Present if and only if the edit doesn't require
  // review.
  //
  // The response type of this operation is PublishAppEditResult.
  google.longrunning.Operation operation = 1;
}
