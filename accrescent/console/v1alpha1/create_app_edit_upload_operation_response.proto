syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";
import "google/longrunning/operations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to creating an app edit upload operation.
message CreateAppEditUploadOperationResponse {
  // An HTTP or HTTPS URL at which an APK set can be submitted with an HTTP PUT
  // request.
  optional string apk_set_upload_url = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uri = true
  ];

  // The upload processing operation.
  //
  // The response type of this operation is UploadAppEditResult.
  google.longrunning.Operation processing_operation = 2 [(buf.validate.field).required = true];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema).json_schema = {
    required: [
      "apkSetUploadUrl",
      "processingOperation"
    ]
  };
}
