syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/user_role.proto";
import "buf/validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// A console user.
message User {
  // The user's unique ID.
  optional string id = 1 [(buf.validate.field).required = true];

  // The user's email.
  optional string email = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];

  // The user's roles.
  repeated UserRole roles = 3 [
    (buf.validate.field).repeated.items.enum.not_in = 0,
    (buf.validate.field).repeated.unique = true
  ];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema).json_schema = {
    required: [
      "id",
      "email",
      "roles"
    ]
  };
}
