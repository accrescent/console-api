syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option go_package = "golang.accrescent.app/genproto/console-api/accrescent/console/v1alpha1;console";
option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for submitting an app draft.
message SubmitAppDraftRequest {
  // The ID of the app draft to submit.
  optional string app_draft_id = 1 [(buf.validate.field).required = true];
}
