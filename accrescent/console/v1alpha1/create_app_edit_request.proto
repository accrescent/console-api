syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for creating an app edit.
message CreateAppEditRequest {
  // The ID of the app to create an edit for.
  optional string app_id = 1 [(buf.validate.field).required = true];
}
