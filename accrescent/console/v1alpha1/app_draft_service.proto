syntax = "proto3";

package accrescent.console.v1alpha1;

import "accrescent/console/v1alpha1/create_app_draft_listing_icon_upload_operation_request.proto";
import "accrescent/console/v1alpha1/create_app_draft_listing_icon_upload_operation_response.proto";
import "accrescent/console/v1alpha1/create_app_draft_listing_request.proto";
import "accrescent/console/v1alpha1/create_app_draft_listing_response.proto";
import "accrescent/console/v1alpha1/create_app_draft_request.proto";
import "accrescent/console/v1alpha1/create_app_draft_response.proto";
import "accrescent/console/v1alpha1/create_app_draft_upload_operation_request.proto";
import "accrescent/console/v1alpha1/create_app_draft_upload_operation_response.proto";
import "accrescent/console/v1alpha1/delete_app_draft_listing_request.proto";
import "accrescent/console/v1alpha1/delete_app_draft_listing_response.proto";
import "accrescent/console/v1alpha1/delete_app_draft_request.proto";
import "accrescent/console/v1alpha1/delete_app_draft_response.proto";
import "accrescent/console/v1alpha1/get_app_draft_download_info_request.proto";
import "accrescent/console/v1alpha1/get_app_draft_download_info_response.proto";
import "accrescent/console/v1alpha1/get_app_draft_listing_icon_download_info_request.proto";
import "accrescent/console/v1alpha1/get_app_draft_listing_icon_download_info_response.proto";
import "accrescent/console/v1alpha1/get_app_draft_request.proto";
import "accrescent/console/v1alpha1/get_app_draft_response.proto";
import "accrescent/console/v1alpha1/list_app_drafts_request.proto";
import "accrescent/console/v1alpha1/list_app_drafts_response.proto";
import "accrescent/console/v1alpha1/publish_app_draft_request.proto";
import "accrescent/console/v1alpha1/publish_app_draft_response.proto";
import "accrescent/console/v1alpha1/submit_app_draft_request.proto";
import "accrescent/console/v1alpha1/submit_app_draft_response.proto";
import "accrescent/console/v1alpha1/update_app_draft_request.proto";
import "accrescent/console/v1alpha1/update_app_draft_response.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Service providing RPCs for managing app drafts.
service AppDraftService {
  // Creates a new app draft.
  rpc CreateAppDraft(CreateAppDraftRequest) returns (CreateAppDraftResponse);

  // Gets an app draft.
  rpc GetAppDraft(GetAppDraftRequest) returns (GetAppDraftResponse);

  // Lists app drafts.
  rpc ListAppDrafts(ListAppDraftsRequest) returns (ListAppDraftsResponse);

  // Creates an app draft upload operation.
  rpc CreateAppDraftUploadOperation(CreateAppDraftUploadOperationRequest) returns (CreateAppDraftUploadOperationResponse);

  // Gets an app draft's download info.
  rpc GetAppDraftDownloadInfo(GetAppDraftDownloadInfoRequest) returns (GetAppDraftDownloadInfoResponse);

  // Updates an app draft.
  rpc UpdateAppDraft(UpdateAppDraftRequest) returns (UpdateAppDraftResponse);

  // Submits an app draft for review.
  rpc SubmitAppDraft(SubmitAppDraftRequest) returns (SubmitAppDraftResponse);

  // Deletes an existing app draft.
  rpc DeleteAppDraft(DeleteAppDraftRequest) returns (DeleteAppDraftResponse);

  // Creates a new app listing for an app draft.
  rpc CreateAppDraftListing(CreateAppDraftListingRequest) returns (CreateAppDraftListingResponse);

  // Creates an app draft listing icon upload operation.
  rpc CreateAppDraftListingIconUploadOperation(CreateAppDraftListingIconUploadOperationRequest) returns (CreateAppDraftListingIconUploadOperationResponse);

  // Gets an app draft listing icon's download info.
  rpc GetAppDraftListingIconDownloadInfo(GetAppDraftListingIconDownloadInfoRequest) returns (GetAppDraftListingIconDownloadInfoResponse);

  // Deletes an existing app draft listing.
  rpc DeleteAppDraftListing(DeleteAppDraftListingRequest) returns (DeleteAppDraftListingResponse);

  // Publishes an app draft to the app store.
  rpc PublishAppDraft(PublishAppDraftRequest) returns (PublishAppDraftResponse);
}
