syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Request defining parameters for creating a reviewer.
message CreateReviewerRequest {
  // The ID of the user to grant reviewer privileges.
  optional string user_id = 1 [(buf.validate.field).required = true];

  // The email at which the reviewer will receive review-related notifications.
  optional string email = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
}
