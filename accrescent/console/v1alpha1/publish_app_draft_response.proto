syntax = "proto3";

package accrescent.console.v1alpha1;

import "buf/validate/validate.proto";
import "google/longrunning/operations.proto";

option java_multiple_files = true;
option java_package = "app.accrescent.console.v1alpha1";

// Response to publishing an app draft.
message PublishAppDraftResponse {
  // The publishing operation.
  //
  // The response type of this operation is PublishAppDraftResult.
  google.longrunning.Operation operation = 1 [(buf.validate.field).required = true];
}
